name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Run tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.txt
        working-directory: app

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output-node-${{ matrix.node-version }}
          path: app/test-output.txt

  build:
    name: Build Docker image
    needs: test
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image-name: devops-app
      context: ./app

  security:
    name: Security scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan application files
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: app/
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table

  prepare-deploy:
    name: Prepare deployment tools
    needs: [build, security]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup DevOps tools
        uses: ./.github/actions/setup-tools
        with:
          install-terraform: "false"

      - name: Use secrets
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Secrets are masked in logs"
          echo "DB_PASSWORD length: ${#DB_PASSWORD}"
          echo "API_KEY length: ${#API_KEY}"

  deploy-staging:
    name: Deploy to staging
    needs: prepare-deploy
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Simulate staging deployment
        run: echo "Deploying to staging..."

  deploy-production:
    name: Deploy to production
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Simulate production deployment
        run: echo "Deploying to production..."
